server {
  listen       80;
  listen  [::]:80;
  server_name  _;
  root   /usr/share/nginx/html;
  index  index.html;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

  # Service worker: never cache, and allow root scope so /scorm-fs/* can be served.
  location = /scorm-sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Service-Worker-Allowed "/";
    try_files $uri =404;
  }

  # HTML entry: never cache (so new deploys are picked up).
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Hashed build assets: cache aggressively (filenames change on every build).
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # SPA fallback — everything else resolves to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
